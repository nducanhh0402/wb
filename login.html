<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | TutorTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            text-align: center;
        }
        .auth-container .logo {
            justify-content: center;
            margin-bottom: 2rem;
        }
        .toggle-text {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .toggle-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .toggle-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="glass-panel auth-container">
        <div class="logo">
            <div class="logo-icon">📚</div>
            <h2>TutorTrack</h2>
        </div>

        <form id="auth-form" class="entry-form">
            <h3 id="form-title">Đăng Nhập</h3>
            
            <div class="form-group" style="text-align: left;">
                <label for="username">Tên tài khoản</label>
                <input type="text" id="username" required placeholder="Nhập tên đăng nhập">
            </div>
            
            <div class="form-group" style="text-align: left;">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" required placeholder="Nhập mật khẩu">
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%;">
                <span id="btn-text">Đăng nhập</span>
            </button>

            <p class="toggle-text">
                <span id="toggle-desc">Chưa có tài khoản?</span> 
                <a href="#" id="toggle-btn">Đăng ký ngay</a>
            </p>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
